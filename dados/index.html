<style>
  :root{
    --navy:#0E2E4D; --navy2:#123B63; --navy3:#1B4E7E; --ink:#071A2C;
    --am:#F9B000; --am-claro:#FFE9AE; --am-escuro:#C98D00;
    --papel:#EFF3F7; --branco:#fff; --tinta:#16222E; --fraca:#5B6B7A; --linha:#DDE4EB;
    --display:"Barlow Condensed","Arial Narrow",Arial,sans-serif;
    --corpo:"Source Sans 3",-apple-system,"Segoe UI",Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--papel);color:var(--tinta);font-family:var(--corpo);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .num{font-variant-numeric:tabular-nums;}

  /* ---------- topo ---------- */
  .topo{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-bottom:4px solid var(--am);}
  .topo-in{max-width:1180px;margin:0 auto;padding:22px 22px 0;}
  .marca{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .marca img{height:40px;}
  .marca h1{font-family:var(--display);font-weight:700;font-size:31px;margin:0;letter-spacing:.01em;}
  .marca h1 span{color:var(--am);}
  .resumo{margin-left:auto;text-align:right;font-size:13px;color:#AFC4D8;}
  .resumo b{display:block;font-family:var(--display);font-size:30px;color:#fff;line-height:1;}

  /* ---------- linha do tempo (a ordem é a vida do animal) ---------- */
  .trilha{display:flex;gap:0;overflow-x:auto;padding:20px 0 0;scrollbar-width:thin;}
  .fase{flex:0 0 auto;background:none;border:0;cursor:pointer;color:#9FB6CC;font-family:inherit;
    padding:0 16px 14px;position:relative;text-align:left;min-width:104px;}
  .fase:first-child{padding-left:0;}
  .fase .marco{display:block;height:3px;background:rgba(255,255,255,.16);margin-bottom:11px;border-radius:2px;transition:background .18s;}
  .fase .et{display:block;font-family:var(--display);font-weight:700;font-size:17px;color:#D6E4F0;letter-spacing:.02em;transition:color .18s;}
  .fase .sub{display:block;font-size:11.5px;color:#7E99B4;line-height:1.25;margin-top:1px;}
  .fase:hover .et{color:#fff;}
  .fase:hover .marco{background:rgba(249,176,0,.5);}
  .fase[aria-selected="true"] .marco{background:var(--am);}
  .fase[aria-selected="true"] .et{color:var(--am);}
  .fase:focus-visible{outline:2px solid var(--am);outline-offset:2px;}

  /* ---------- corpo ---------- */
  main{max-width:1180px;margin:0 auto;padding:26px 22px 60px;}
  .cabeca{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:20px;}
  .cabeca h2{font-family:var(--display);font-weight:700;font-size:34px;margin:0;color:var(--navy);line-height:1;}
  .cabeca .cont{font-size:14px;color:var(--fraca);padding-bottom:3px;}
  .busca{margin-left:auto;position:relative;}
  .busca input{font-family:inherit;font-size:15px;padding:9px 13px 9px 36px;border:1px solid var(--linha);
    border-radius:9px;background:#fff;width:250px;color:var(--tinta);}
  .busca input:focus{outline:2px solid var(--navy3);outline-offset:0;border-color:var(--navy3);}
  .busca svg{position:absolute;left:11px;top:10px;width:16px;height:16px;fill:none;stroke:var(--fraca);stroke-width:2;}

  .grade{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;align-items:start;}
  .cartao{background:var(--branco);border:1px solid var(--linha);border-radius:13px;padding:17px 18px 15px;}
  .cartao .qn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--am-escuro);letter-spacing:.08em;}
  .cartao h3{font-size:15.5px;font-weight:600;margin:1px 0 3px;line-height:1.32;color:var(--navy);}
  .cartao .n{font-size:12.5px;color:var(--fraca);margin-bottom:12px;}

  /* barras (categórico) */
  .b{margin-bottom:9px;}
  .b:last-child{margin-bottom:2px;}
  .b-topo{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;margin-bottom:3px;}
  .b-rot{color:var(--tinta);}
  .b-val{color:var(--fraca);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .b-val b{color:var(--navy);}
  .trilho{height:9px;background:#EDF1F5;border-radius:5px;overflow:hidden;}
  .barra{height:100%;background:var(--am);border-radius:5px;transition:width .5s cubic-bezier(.2,.7,.3,1);}
  .b:nth-child(n+2) .barra{background:#F5C453;}
  .b:nth-child(n+5) .barra{background:#9FB6CC;}
  .mais{margin-top:9px;background:none;border:0;color:var(--navy3);font-family:inherit;font-size:13px;
    font-weight:600;cursor:pointer;padding:2px 0;}
  .mais:hover{text-decoration:underline;}

  /* numérico */
  .faixas{display:flex;gap:14px;padding:9px 0 12px;border-bottom:1px solid var(--linha);margin-bottom:11px;}
  .fx{flex:1;}
  .fx .r{display:block;font-size:11px;color:var(--fraca);text-transform:uppercase;letter-spacing:.06em;}
  .fx .v{display:block;font-family:var(--display);font-weight:700;font-size:23px;color:var(--navy);line-height:1.1;font-variant-numeric:tabular-nums;}
  .fx.dest .v{color:var(--am-escuro);}
  .hist{display:flex;align-items:flex-end;gap:3px;height:78px;}
  .hb{flex:1;background:#DCE6EF;border-radius:3px 3px 0 0;position:relative;min-height:2px;transition:background .15s;}
  .hb:hover{background:var(--am);}
  .hb span{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:5px;background:var(--navy);
    color:#fff;font-size:11px;padding:3px 7px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s;}
  .hb:hover span{opacity:1;}
  .heixo{display:flex;justify-content:space-between;font-size:10.5px;color:var(--fraca);margin-top:5px;}

  .vazio{background:#fff;border:1px dashed var(--linha);border-radius:13px;padding:46px 20px;text-align:center;color:var(--fraca);}
  .aviso-demo{background:#FFF6E0;border-bottom:1px solid #F0C24B;color:#7A5C12;font-size:13.5px;text-align:center;padding:9px 16px;}
  footer{border-top:1px solid var(--linha);padding:26px 22px 40px;text-align:center;color:var(--fraca);font-size:13px;}
  @media (max-width:640px){
    .marca h1{font-size:24px;} .resumo{margin-left:0;text-align:left;width:100%;}
    .busca{margin-left:0;width:100%;} .busca input{width:100%;} .cabeca h2{font-size:27px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
</style>
</head>

<div id="demo" class="aviso-demo" hidden></div>

<header class="topo">

      <h1>Dados <span>Alta CRIA 2026</span></h1>
      <div class="resumo"><b class="num" id="nFaz">—</b> fazendas responderam<br><span id="quando"></span></div>
    </div>
    <nav class="trilha" id="trilha" role="tablist" aria-label="Etapas"></nav>
  </div>
</header>

<main>
  <div class="cabeca">
    <h2 id="tituloCap">—</h2>
    <span class="cont" id="contCap"></span>
    <div class="busca">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="busca" type="search" placeholder="Buscar em todas as perguntas" aria-label="Buscar">
    </div>
  </div>
  <div class="grade" id="grade"></div>
  <div class="vazio" id="vazio" hidden></div>
</main>

<footer>
  <p>Programa Alta CRIA · Alta Genetics Brasil<br>
  Dados agregados das fazendas participantes. Nenhuma fazenda é identificada.</p>
</footer>

<script>
const FASES = {"1": ["A fazenda", "contexto"], "2": ["Pré-parto", "antes de nascer"], "3": ["Maternidade", "o parto"], "4": ["Colostragem", "primeiras horas"], "5": ["Nutrição", "até o desaleitamento"], "6": ["Sanidade", "doença e morte"], "7": ["Ambiente", "onde vive"], "8": ["Recria", "até a novilha"], "9": ["Custos", "o que custa"], "10": ["O programa", "devolutiva"]};
let DADOS = null, capAtual = 0, termo = '';
const $ = id => document.getElementById(id);
const nf = n => Number(n).toLocaleString('pt-BR', { maximumFractionDigits: 1 });
const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

fetch('dados.json')
  .then(r => { if (!r.ok) throw new Error('sem arquivo'); return r.json(); })
  .then(d => { DADOS = d; iniciar(); })
  .catch(() => {
    $('vazio').hidden = false;
    $('vazio').innerHTML = '<b>Os dados ainda não foram publicados.</b><br>Assim que as fazendas responderem, os resultados aparecem aqui.';
  });

function iniciar() {
  if (DADOS.demo) { $('demo').hidden = false; $('demo').textContent = 'Demonstração: números simulados apenas para conferir o funcionamento. Não são dados reais de fazendas.'; }
  $('nFaz').textContent = nf(DADOS.n_fazendas);
  const dt = new Date(DADOS.gerado_em);
  $('quando').textContent = isNaN(dt) ? '' : 'atualizado em ' + dt.toLocaleDateString('pt-BR');
  if (!DADOS.capitulos || !DADOS.capitulos.length) {
    $('vazio').hidden = false;
    $('vazio').innerHTML = '<b>Ainda não há respostas suficientes.</b>';
    return;
  }
  montarTrilha(); render();
}

function montarTrilha() {
  $('trilha').innerHTML = DADOS.capitulos.map((c, i) => {
    const f = FASES[c.idx] || [c.titulo, ''];
    return `<button class="fase" role="tab" data-i="${i}" aria-selected="${i === 0}">
      <span class="marco"></span><span class="et">${esc(f[0])}</span><span class="sub">${esc(f[1])}</span></button>`;
  }).join('');
  $('trilha').querySelectorAll('.fase').forEach(b => b.addEventListener('click', () => {
    capAtual = +b.dataset.i; termo = ''; $('busca').value = ''; render();
  }));
}

$('busca').addEventListener('input', e => { termo = e.target.value.trim().toLowerCase(); render(); });

function perguntasVisiveis() {
  if (termo) {
    const out = [];
    DADOS.capitulos.forEach(c => c.perguntas.forEach(q => {
      if ((q.titulo + ' ' + q.num).toLowerCase().includes(termo)) out.push(q);
    }));
    return out;
  }
  return DADOS.capitulos[capAtual].perguntas;
}

function render() {
  const qs = perguntasVisiveis();
  $('trilha').querySelectorAll('.fase').forEach(b => b.setAttribute('aria-selected', !termo && +b.dataset.i === capAtual));
  if (termo) {
    $('tituloCap').textContent = 'Busca';
    $('contCap').textContent = qs.length + (qs.length === 1 ? ' pergunta encontrada' : ' perguntas encontradas');
  } else {
    const c = DADOS.capitulos[capAtual];
    $('tituloCap').textContent = c.titulo;
    $('contCap').textContent = c.perguntas.length + ' perguntas';
  }
  $('vazio').hidden = qs.length > 0;
  if (!qs.length) { $('vazio').innerHTML = '<b>Nada encontrado.</b><br>Tente outra palavra.'; $('grade').innerHTML = ''; return; }
  $('grade').innerHTML = qs.map(cartao).join('');
  $('grade').querySelectorAll('.mais').forEach(b => b.addEventListener('click', () => {
    const box = b.previousElementSibling;
    box.querySelectorAll('.b[hidden]').forEach(x => x.hidden = false);
    b.remove();
  }));
  requestAnimationFrame(() => $('grade').querySelectorAll('.barra').forEach(x => x.style.width = x.dataset.w + '%'));
}

function cartao(q) {
  const topo = `<div class="qn">${esc(q.num)}</div><h3>${esc(q.titulo)}</h3>
    <div class="n num">${nf(q.n)} ${q.n === 1 ? 'fazenda respondeu' : 'fazendas responderam'}</div>`;
  return `<article class="cartao">${topo}${q.tipo === 'numerico' || q.tipo === 'escala' ? corpoNum(q) : corpoCat(q)}</article>`;
}

function corpoCat(q) {
  if (!q.opcoes || !q.opcoes.length) return '<p class="n">Sem respostas.</p>';
  const LIM = 5, max = Math.max(...q.opcoes.map(o => o.pct));
  const barras = q.opcoes.map((o, i) => `
    <div class="b"${i >= LIM ? ' hidden' : ''}>
      <div class="b-topo"><span class="b-rot">${esc(o.rotulo)}</span>
        <span class="b-val"><b>${nf(o.pct)}%</b> · ${nf(o.n)}</span></div>
      <div class="trilho"><div class="barra" data-w="${max ? (o.pct / max * 100).toFixed(1) : 0}" style="width:0"></div></div>
    </div>`).join('');
  const extra = q.opcoes.length > LIM ? `<button class="mais">Ver as outras ${q.opcoes.length - LIM}</button>` : '';
  return `<div>${barras}</div>${extra}`;
}

function corpoNum(q) {
  if (!q.n) return '<p class="n">Sem respostas.</p>';
  const resumo = `<div class="faixas">
      <div class="fx"><span class="r">25%</span><span class="v num">${nf(q.p25)}</span></div>
      <div class="fx dest"><span class="r">Mediana</span><span class="v num">${nf(q.mediana)}</span></div>
      <div class="fx"><span class="r">75%</span><span class="v num">${nf(q.p75)}</span></div>
      <div class="fx"><span class="r">Média</span><span class="v num">${nf(q.media)}</span></div>
    </div>`;
  if (!q.hist || !q.hist.length) return resumo;
  const max = Math.max(...q.hist.map(h => h.n)) || 1;
  const barras = q.hist.map(h => `<div class="hb" style="height:${Math.max(2, h.n / max * 100)}%">
      <span>${esc(h.faixa)}: ${nf(h.n)} ${h.n === 1 ? 'fazenda' : 'fazendas'}</span></div>`).join('');
  return `${resumo}<div class="hist">${barras}</div>
    <div class="heixo"><span>${esc(q.hist[0].faixa)}</span><span>${esc(q.hist[q.hist.length - 1].faixa)}</span></div>`;
}
</script>
</body>
</html>
